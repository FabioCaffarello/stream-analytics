---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability-stack
resources:
  - ../../base
patches:
  - path: patches/deployment.yaml
    target:
      kind: Deployment
      name: prometheus
replicas:
  - name: prometheus
    count: 1
images:
  - name: prom/prometheus
    newTag: v2.54.1
