---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stream-analytics-client-default
  namespace: stream-analytics-client
  labels:
    app.kubernetes.io/part-of: stream-analytics
    app.kubernetes.io/managed-by: argocd
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow ingress-nginx to reach client pods on port 8090
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8090
    # Allow Prometheus to scrape metrics
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability-stack
      ports:
        - protocol: TCP
          port: 8090

  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow proxying to stream-analytics-server (WebSocket + REST)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: stream-analytics-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: stream-analytics-server
      ports:
        - protocol: TCP
          port: 8080
