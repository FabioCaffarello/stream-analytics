---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stream-analytics-system-default
  namespace: stream-analytics-system
  labels:
    app.kubernetes.io/part-of: stream-analytics
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability-stack
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector: {}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: data-management
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 8123
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: analytics
      ports:
        - protocol: TCP
          port: 9092
