apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-plaintext-secrets
spec:
  validationFailureAction: enforce
  rules:
    - name: deny-secret-without-sops-or-external
      match:
        resources:
          kinds:
            - Secret
      preconditions:
        - key: "{{ request.object.metadata.annotations.sops }}"
          operator: NotEquals
          value: null
      # If precondition fails (annotation missing), next rule applies via deny using denyIfNotPresent below
      validate:
        message: "Secrets must be managed via SOPS (include 'sops' top-level mapping) or be ExternalSecret-managed."
        pattern:
          metadata:
            annotations:
              sops: "?*"
