<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Raccoon</title>
    <link
        rel="preload"
        href="app.wasm"
        as="fetch"
        type="application/wasm"
        crossorigin="anonymous"
    />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #0a0a0a; color: #e0e0e0; font-family: system-ui, sans-serif; }
        #app { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1rem; }
        canvas { display: block; border: 1px solid #333; }
        #output { white-space: pre-wrap; font-family: monospace; font-size: 13px; max-width: 80ch; color: #888; }
        .error { color: #f44; }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="canvas" width="800" height="600"></canvas>
        <pre id="output">Loading WASM...</pre>
    </div>
    <script type="module" src="odin.js"></script>
</body>
</html>
