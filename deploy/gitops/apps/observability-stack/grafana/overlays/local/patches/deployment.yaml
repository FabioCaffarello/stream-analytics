---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability-stack
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: grafana
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
