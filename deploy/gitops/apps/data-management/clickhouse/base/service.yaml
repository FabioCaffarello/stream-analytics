---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: data-management
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: stream-analytics
    app.kubernetes.io/managed-by: argocd
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: clickhouse
  ports:
    - port: 8123
      name: http
      targetPort: http
      protocol: TCP
    - port: 9000
      name: native
      targetPort: native
      protocol: TCP
