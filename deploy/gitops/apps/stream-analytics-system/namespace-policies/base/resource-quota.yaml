---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: stream-analytics-system
  labels:
    app.kubernetes.io/part-of: stream-analytics
    app.kubernetes.io/managed-by: argocd
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "50"
    persistentvolumeclaims: "10"
