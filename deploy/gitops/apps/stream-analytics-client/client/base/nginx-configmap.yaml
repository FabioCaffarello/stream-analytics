---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stream-analytics-client-nginx
  namespace: stream-analytics-client
  labels:
    app.kubernetes.io/name: stream-analytics-client
    app.kubernetes.io/part-of: stream-analytics
    app.kubernetes.io/managed-by: argocd
data:
  default.conf: |
    server {
        listen 8090;
        server_name _;

        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location /ws {
            proxy_pass http://stream-analytics-server.stream-analytics-system.svc:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/ {
            proxy_pass http://stream-analytics-server.stream-analytics-system.svc:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            add_header X-Content-Type-Options nosniff;
            add_header X-Frame-Options SAMEORIGIN;
            add_header X-XSS-Protection "1; mode=block";

            location ~* \.(js|css|wasm|png|jpg|ico|svg)$ {
                expires 7d;
                add_header Cache-Control "public, immutable";
            }
        }
    }
