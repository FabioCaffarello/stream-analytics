---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: analytics
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: message-bus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
      protocol: TCP
    - name: admin
      port: 9644
      targetPort: admin
      protocol: TCP
    - name: proxy
      port: 8082
      targetPort: proxy
      protocol: TCP
    - name: schema-reg
      port: 8081
      targetPort: schema-reg
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: analytics
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: message-bus
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
      protocol: TCP
