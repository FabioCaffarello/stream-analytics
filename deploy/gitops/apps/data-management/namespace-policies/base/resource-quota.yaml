---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: default-quota
  namespace: data-management
  labels:
    app.kubernetes.io/part-of: stream-analytics
    app.kubernetes.io/managed-by: argocd
spec:
  hard:
    requests.cpu: "8"
    requests.memory: "16Gi"
    limits.cpu: "16"
    limits.memory: "32Gi"
    pods: "30"
    persistentvolumeclaims: "20"
