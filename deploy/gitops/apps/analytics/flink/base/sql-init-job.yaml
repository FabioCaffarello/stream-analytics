---
apiVersion: batch/v1
kind: Job
metadata:
  name: flink-sql-init
  namespace: analytics
  labels:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: sql-init
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink
        app.kubernetes.io/component: sql-init
    spec:
      serviceAccountName: flink
      restartPolicy: OnFailure
      securityContext:
        runAsUser: 9999
        runAsGroup: 9999
        fsGroup: 9999
        runAsNonRoot: true
      initContainers:
        - name: wait-for-jobmanager
          image: curlimages/curl:8.6.0
          command:
            - /bin/sh
            - -c
            - |
              until curl -sf http://flink-jobmanager:8081/overview > /dev/null 2>&1; do
                echo "waiting for flink-jobmanager..."; sleep 5;
              done
              echo "flink-jobmanager is ready"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: sql-init
          image: flink:1.19-java11
          command:
            - /bin/bash
            - /sql/init.sh
          env:
            - name: TIMESCALE_USER
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: TIMESCALE_USER
            - name: TIMESCALE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: TIMESCALE_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: sql-volume
              mountPath: /sql
            - name: flink-config-volume
              mountPath: /opt/flink/conf
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: sql-volume
          configMap:
            name: flink-sql
            defaultMode: 0755
        - name: flink-config-volume
          configMap:
            name: flink-config
            items:
              - key: flink-conf.yaml
                path: flink-conf.yaml
