server {
    listen       8090;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── MIME Types ─────────────────────────────────────────────
    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js mjs;
        application/wasm                      wasm;
        application/json                      json;
        image/png                             png;
        image/svg+xml                         svg;
        application/octet-stream              bin;
    }

    # ── Gzip ──────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_min_length 256;
    gzip_types
        text/css
        application/javascript
        application/json
        application/wasm;

    # ── Runtime Asset Caching ─────────────────────────────────
    # app.wasm/odin.js are rebuilt frequently in dev and are not content-hashed.
    # Disable browser caching to avoid stale runtime behavior after make up.
    location ~* \.(wasm|js)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
    }

    # ── SPA Fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Health Check Endpoint ─────────────────────────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── WebSocket Proxy ──────────────────────────────────────
    location /ws {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        # Local-dev auth bridge so browser users on :8090 receive live data by default.
        proxy_set_header   X-API-Key  "prod_key_1";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── HTTP API Proxy (same-origin for web client) ──────────
    location /api/ {
        proxy_pass         http://server:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
