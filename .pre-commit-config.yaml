repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: metrics-unstaged-guard
        name: metrics unstaged guard
        language: system
        entry: scripts/check-metrics-unstaged.sh
        pass_filenames: false

      - id: go-tidy-check
        name: go tidy check changed
        language: system
        entry: make tidy-check-changed
        pass_filenames: false

      - id: go-fmt-check
        name: go fmt check
        language: system
        entry: make fmt-check
        pass_filenames: false

      - id: legacy-check-staged
        name: legacy check staged
        language: system
        entry: make legacy-check-staged
        pass_filenames: false

      - id: go-lint-changed
        name: go lint changed
        language: system
        entry: make lint-changed
        pass_filenames: false

      - id: go-test-short-changed
        name: go test short changed
        language: system
        entry: make test-short-changed
        pass_filenames: false

      - id: legacy-check
        name: legacy check
        language: system
        entry: make legacy-check
        pass_filenames: false
        stages: [pre-push]

      - id: go-test-integration-changed
        name: go test integration changed
        language: system
        entry: make test-integration-changed
        pass_filenames: false
        stages: [pre-push]

      - id: commit-msg-conventional
        name: commit msg conventional
        language: system
        entry: scripts/validate-commit-msg.sh
        stages: [commit-msg]
