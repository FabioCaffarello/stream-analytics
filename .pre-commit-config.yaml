repos:
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.73.0
    hooks:
      - id: terraform_fmt

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.27.0
    hooks:
      - id: yamllint
        files: ^deploy/gitops/
        args: ["-c", ".yamllint.yaml"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks
        name: gitleaks
        entry: gitleaks detect --source . --config .gitleaks.toml
        language: system
        files: ''

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ensure-no-plain-secrets
        name: Prevent plaintext Kubernetes Secret manifests outside SOPS/ExternalSecret
        entry: bash scripts/ci/ensure-no-plain-secrets.sh
        language: system
        files: ^deploy/gitops/

      - id: k8s-validate
        name: Kustomize build + kubeconform (local)
        entry: bash scripts/ci/k8s-validate.sh
        language: system
        files: ^deploy/gitops/
        pass_filenames: false

      - id: go-tidy-check
        name: go tidy check changed
        language: system
        entry: make tidy-check-changed
        pass_filenames: false

      - id: go-fmt-check
        name: go fmt check
        language: system
        entry: make fmt-check
        pass_filenames: false

      - id: legacy-check-staged
        name: legacy check staged
        language: system
        entry: make legacy-check-staged
        pass_filenames: false

      - id: go-lint-changed
        name: go lint changed
        language: system
        entry: make lint-changed
        pass_filenames: false

      - id: go-test-short-changed
        name: go test short changed
        language: system
        entry: make test-short-changed
        pass_filenames: false

      - id: legacy-check
        name: legacy check
        language: system
        entry: make legacy-check
        pass_filenames: false
        stages: [pre-push]

      - id: go-test-integration-changed
        name: go test integration changed
        language: system
        entry: make test-integration-changed
        pass_filenames: false
        stages: [pre-push]

      - id: commit-msg-conventional
        name: commit msg conventional
        language: system
        entry: scripts/validate-commit-msg.sh
        stages: [commit-msg]

      # Run govulncheck at pre-push (optional heavy check; can be gated via VULN_REQUIRED)
      - id: govulncheck
        name: govulncheck (pre-push)
        language: system
        entry: make vuln
        pass_filenames: false
        stages: [pre-push]
