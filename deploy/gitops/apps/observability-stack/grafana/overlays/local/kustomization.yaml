---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability-stack
resources:
  - ../../base
patches:
  - path: patches/deployment.yaml
    target:
      kind: Deployment
      name: grafana
replicas:
  - name: grafana
    count: 1
images:
  - name: grafana/grafana
    newTag: "11.2.0"
