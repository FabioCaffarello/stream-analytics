version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  disable:
    - godox
    - musttag
  enable:
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: blank-imports
        - name: imports-blocklist
        - name: receiver-naming
        - name: error-return
        - name: error-strings
  exclusions:
    rules:
      - path: ^internal/actors/
        linters:
          - revive
          - gocyclo
      - path: ^internal/shared/config/loader\.go$
        linters:
          - gocyclo
      # Deferred Close/Drain without error check is an accepted cleanup pattern.
      - linters:
          - errcheck
        text: "\\.(Close|Drain)` is not checked"
      # gosec G104 mirrors errcheck for the same Close/Drain cleanup pattern.
      - linters:
          - gosec
        text: "G104"
      # Test files may use simplified configs, temp paths, and placeholder credentials.
      - path: "_test\\.go$"
        linters:
          - gosec
          - gocyclo

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
