---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability-stack
resources:
  - deployment.yaml
  - service.yaml
components:
  - ../../../../lib/labels
configMapGenerator:
  - name: grafana-provisioning
    files:
      - datasources.yaml
    options:
      disableNameSuffixHash: true
  - name: grafana-dashboards-provisioning
    files:
      - dashboards.yml
    options:
      disableNameSuffixHash: true
