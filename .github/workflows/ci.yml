name: workspace-ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
      - name: Proto lint
        run: buf lint proto
      - name: Proto breaking
        run: make proto-breaking
      - name: Proto generate check
        run: |
          make proto-gen
          git diff --exit-code
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
      - name: Install tools
        run: make install-tools
      - name: Run CI pipeline
        run: make ci VULN_REQUIRED=true
