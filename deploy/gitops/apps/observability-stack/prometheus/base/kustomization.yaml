---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability-stack
resources:
  - deployment.yaml
  - service.yaml
components:
  - ../../../../lib/labels
configMapGenerator:
  - name: prometheus-config
    files:
      - prometheus.yml
    options:
      disableNameSuffixHash: true
