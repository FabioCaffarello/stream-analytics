apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: deny-plaintext-secrets
spec:
  validationFailureAction: enforce
  rules:
    - name: deny-secret-without-sops-or-external
      match:
        resources:
          kinds:
            - Secret
      exclude:
        resources:
          namespaces:
            - kube-system
            - kube-public
      validate:
        message: "Secrets must be managed via SOPS (include 'sops' annotation) or be ExternalSecret-managed."
        pattern:
          metadata:
            annotations:
              sops: "?*"
