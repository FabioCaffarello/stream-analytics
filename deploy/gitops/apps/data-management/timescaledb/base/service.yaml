  namespace: data-management
  labels:
    app.kubernetes.io/name: timescaledb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: stream-analytics
    app.kubernetes.io/managed-by: argocd
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: timescaledb
  ports:
    - port: 5432
      name: postgres
      targetPort: postgres
      protocol: TCP
