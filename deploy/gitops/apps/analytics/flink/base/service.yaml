---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: analytics
  labels:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: jobmanager
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: rpc
      protocol: TCP
    - name: blob
      port: 6124
      targetPort: blob
      protocol: TCP
    - name: ui
      port: 8081
      targetPort: ui
      protocol: TCP
