name: cd

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: cd-release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # ── CI gate: ci-fast must pass before any image is built ───────────
  ci-gate:
    uses: ./.github/workflows/ci-fast.yml
    permissions:
      contents: read

  # ── Parallel per-binary build, push, and attestation ───────────────
  build-push:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        binary: [server, consumer, processor, store, migrate, client, flink]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca  # v3.9.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893  # v5.9.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.binary }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          context: .
          file: deploy/docker/${{ matrix.binary }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.binary }}
          cache-to: type=gha,mode=max,scope=${{ matrix.binary }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a4  # v0.30.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.binary }}@${{ steps.push.outputs.digest }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          format: 'table'

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.binary }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ── GitOps: bump image tags in staging/prod overlays ───────────────
  gitops-update:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35351f26c  # v2.1.0

      - name: Extract semver from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update image tags in staging and prod overlays
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          GITOPS="deploy/gitops/apps/stream-analytics-system"
          for svc in stream-analytics-consumer stream-analytics-processor \
                     stream-analytics-server stream-analytics-store stream-analytics-migrate; do
            for env in staging prod; do
              (cd "$GITOPS/$svc/overlays/$env" && \
                kustomize edit set image \
                  "ghcr.io/${{ github.repository_owner }}/$svc:${VERSION}")
            done
          done

          # Update client image tag
          CLIENT_GITOPS="deploy/gitops/apps/stream-analytics-client/client"
          for env in staging prod; do
            (cd "$CLIENT_GITOPS/overlays/$env" && \
              kustomize edit set image \
                "nginx=ghcr.io/${{ github.repository_owner }}/client:${VERSION}")
          done

          # Update flink image tag (jobmanager + taskmanager use same image)
          FLINK_GITOPS="deploy/gitops/apps/analytics/flink"
          for env in staging prod; do
            (cd "$FLINK_GITOPS/overlays/$env" && \
              kustomize edit set image \
                "ghcr.io/${{ github.repository_owner }}/flink:${VERSION}")
          done

      - name: Commit and push gitops tag bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/gitops/apps/stream-analytics-system/ \
                  deploy/gitops/apps/stream-analytics-client/ \
                  deploy/gitops/apps/analytics/flink/
          git diff --cached --quiet || \
            git commit -m "chore(gitops): bump images to v${{ steps.version.outputs.tag }}"
          git push
