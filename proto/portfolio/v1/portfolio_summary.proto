syntax = "proto3";

package portfolio.v1;

option go_package = "github.com/market-raccoon/internal/shared/proto/gen/portfolio/v1";

import "portfolio/v1/state.proto";

// PortfolioSummaryV1 aggregates all accounts into a global operational view.
// This is a read model projected from accumulated PortfolioStateV1 events.
message PortfolioSummaryV1 {
  // summary_id is the immutable identifier for this portfolio summary.
  string summary_id = 1;
  // projected_at_ms is the projection timestamp in Unix milliseconds.
  int64 projected_at_ms = 2;
  // accounts is the list of per-account summaries.
  repeated AccountSummaryV1 accounts = 3;
  // global_equity_usd is total equity across all accounts in USD.
  double global_equity_usd = 4;
  // global_realized_usd is cumulative realized PnL across all accounts in USD.
  double global_realized_usd = 5;
  // global_unrealized_usd is current unrealized PnL across all accounts in USD.
  double global_unrealized_usd = 6;
  // global_margin_used_usd is total margin allocated across all accounts in USD.
  double global_margin_used_usd = 7;
  // global_leverage is aggregate leverage across all accounts.
  double global_leverage = 8;
  // total_position_count is number of open positions across all accounts.
  int32 total_position_count = 9;
  // total_open_orders is number of pending orders across all accounts.
  int32 total_open_orders = 10;
  // fill_summary captures aggregate fill metrics across all accounts.
  FillSummaryV1 fill_summary = 11;

  reserved 100 to 199;
}

// AccountSummaryV1 is a lightweight per-account summary within a global portfolio view.
message AccountSummaryV1 {
  // account_id is the account identifier.
  string account_id = 1;
  // venue_count is the number of active venues for this account.
  int32 venue_count = 2;
  // position_count is the number of open positions for this account.
  int32 position_count = 3;
  // equity_usd is account-level equity in USD.
  double equity_usd = 4;
  // realized_pnl_usd is account-level realized PnL in USD.
  double realized_pnl_usd = 5;
  // unrealized_pnl_usd is account-level unrealized PnL in USD.
  double unrealized_pnl_usd = 6;

  reserved 100 to 199;
}
