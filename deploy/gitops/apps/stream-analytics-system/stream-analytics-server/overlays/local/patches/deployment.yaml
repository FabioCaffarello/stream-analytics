---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-analytics-server
  namespace: stream-analytics-system
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: app
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
