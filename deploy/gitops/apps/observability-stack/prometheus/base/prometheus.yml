global:
  scrape_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/recording.rules.yml
  - /etc/prometheus/alerts.rules.yml
  - /etc/prometheus/shard-alerts.rules.yml

scrape_configs:
  - job_name: 'stream-analytics'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'stream-analytics-server.stream-analytics-system.svc:8080'
          - 'stream-analytics-consumer.stream-analytics-system.svc:8081'
          - 'stream-analytics-processor.stream-analytics-system.svc:8082'
          - 'stream-analytics-store.stream-analytics-system.svc:8083'
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
