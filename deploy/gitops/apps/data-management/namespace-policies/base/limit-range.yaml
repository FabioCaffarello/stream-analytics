---
apiVersion: v1
kind: LimitRange
metadata:
  name: default-limits
  namespace: data-management
  labels:
    app.kubernetes.io/part-of: stream-analytics
    app.kubernetes.io/managed-by: argocd
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: "1Gi"
      defaultRequest:
        cpu: "200m"
        memory: "256Mi"
      max:
        cpu: "8"
        memory: "16Gi"
