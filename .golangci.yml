version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  disable:
    - godox
    - musttag
  enable:
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: blank-imports
        - name: imports-blocklist
        - name: receiver-naming
        - name: error-return
        - name: error-strings
  exclusions:
    rules:
      - path: ^internal/actors/
        linters:
          - revive
          - gocyclo
      - path: ^internal/shared/config/loader\.go$
        linters:
          - gocyclo

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
