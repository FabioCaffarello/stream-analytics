global:
  scrape_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/recording.rules.yml
  - /etc/prometheus/alerts.rules.yml
  - /etc/prometheus/shard-alerts.rules.yml

scrape_configs:
  - job_name: 'market-raccoon'
    metrics_path: /metrics
    static_configs:
      - targets: ['server:8080', 'consumer:8081', 'processor:8082', 'store:8083']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
