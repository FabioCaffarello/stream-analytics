---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: analytics
  labels:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: taskmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: taskmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink
        app.kubernetes.io/component: taskmanager
    spec:
      serviceAccountName: flink
      securityContext:
        runAsUser: 9999
        runAsGroup: 9999
        fsGroup: 9999
        runAsNonRoot: true
      containers:
        - name: taskmanager
          image: flink:1.19-java11
          args: ["taskmanager"]
          ports:
            - name: data
              containerPort: 6121
              protocol: TCP
            - name: rpc
              containerPort: 6122
              protocol: TCP
          env:
            - name: FLINK_PROPERTIES
              valueFrom:
                configMapKeyRef:
                  name: flink-config
                  key: flink-conf.yaml
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: flink-config-volume
              mountPath: /opt/flink/conf
          livenessProbe:
            tcpSocket:
              port: rpc
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: rpc
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: flink-config-volume
          configMap:
            name: flink-config
            items:
              - key: flink-conf.yaml
                path: flink-conf.yaml
              - key: log4j-console.properties
                path: log4j-console.properties
