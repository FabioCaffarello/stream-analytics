# Prometheus unit tests for alert rules.
# Run with: promtool test rules deploy/observability/prometheus/tests.yml
#
# Strategy: inject recording-rule series directly as inputs so tests are
# self-contained and fast (no need to replay >1h of raw metric history).
# Only alerts.rules.yml is loaded; recording.rules.yml is validated
# separately via `promtool check rules`.

rule_files:
  - alerts.rules.yml

evaluation_interval: 1m

tests:
  # ── Test 1 ────────────────────────────────────────────────────────────────
  # SLOIngestBurnRateFast must fire when BOTH 5m and 1h windows exceed 14.4.
  # for: 2m → alert is active at eval_time=3m (condition true since t=0).
  - interval: 1m
    input_series:
      - series: 'slo:ingest:burn_rate_5m{service="market-raccoon",stream="bookdelta",venue="binance"}'
        values: "20+0x4"
      - series: 'slo:ingest:burn_rate_1h{service="market-raccoon",stream="bookdelta",venue="binance"}'
        values: "20+0x4"
    alert_rule_test:
      - eval_time: 3m
        alertname: SLOIngestBurnRateFast
        exp_alerts:
          - exp_labels:
              severity: page
              service: market-raccoon
              slo: ingest
              stream: bookdelta
              venue: binance
            exp_annotations:
              summary: "Ingest SLO fast burn-rate high"
              description: "Ingest error budget burn-rate is above fast threshold on 5m/1h windows."
              runbook_url: "docs/observability/runbooks/ingest.md"

  # ── Test 2 ────────────────────────────────────────────────────────────────
  # DataLossDropRateNonZero must NOT fire at 14m (transient < for:15m),
  # and MUST fire at 16m (sustained ≥ 15m). Validates noise-reduction fix.
  - interval: 1m
    input_series:
      - series: 'slo:data_loss:drop_rate_5m{service="market-raccoon",stream="all",venue="all"}'
        values: "0.001+0x17"
    alert_rule_test:
      - eval_time: 14m
        alertname: DataLossDropRateNonZero
        exp_alerts: []   # still pending — must NOT page on transient event
      - eval_time: 16m
        alertname: DataLossDropRateNonZero
        exp_alerts:
          - exp_labels:
              severity: ticket
              service: market-raccoon
              slo: data_loss
              stream: all
              venue: all
            exp_annotations:
              summary: "Drop-rate detected"
              description: "Drop-related counters are increasing in the last 5 minutes."
              runbook_url: "docs/observability/runbooks/bus.md"

  # ── Test 3 ────────────────────────────────────────────────────────────────
  # ColdPathCommitErrorsNonZero: same policy — no page at 14m, ticket at 16m.
  - interval: 1m
    input_series:
      - series: 'slo:data_loss:cold_commit_errors_rate_5m{service="market-raccoon",stream="all",venue="all"}'
        values: "0.001+0x17"
    alert_rule_test:
      - eval_time: 14m
        alertname: ColdPathCommitErrorsNonZero
        exp_alerts: []   # still pending
      - eval_time: 16m
        alertname: ColdPathCommitErrorsNonZero
        exp_alerts:
          - exp_labels:
              severity: ticket
              service: market-raccoon
              slo: data_loss
              stream: all
              venue: all
            exp_annotations:
              summary: "Cold-path commit errors detected"
              description: "Cold-path commit/write related errors are increasing in the last 5 minutes."
              runbook_url: "docs/operations/cold-path-runbook.md"

  # ── Test 4 ────────────────────────────────────────────────────────────────
  # SLOIngestBurnRateFast must NOT fire when only the 5m window exceeds 14.4
  # but the 1h window stays below the threshold (conjunction guard).
  - interval: 1m
    input_series:
      - series: 'slo:ingest:burn_rate_5m{service="market-raccoon",stream="bookdelta",venue="binance"}'
        values: "20+0x4"
      - series: 'slo:ingest:burn_rate_1h{service="market-raccoon",stream="bookdelta",venue="binance"}'
        values: "5+0x4"
    alert_rule_test:
      - eval_time: 3m
        alertname: SLOIngestBurnRateFast
        exp_alerts: []   # 1h below threshold — conjunction false, must NOT fire

  # ── Test 5a ───────────────────────────────────────────────────────────────
  # ConsumerLagGrowingNoProgress must fire when lag derivative > 0 AND
  # commit rate ≈ 0 for 5 minutes. Validates no-progress detection.
  # Both series are recording-rule outputs injected directly.
  - interval: 1m
    input_series:
      - series: 'slo:consumer_lag:deriv_5m{service="market-raccoon"}'
        values: "5+0x10"
      - series: 'slo:store:commit_rate_ok_5m{service="market-raccoon"}'
        values: "0+0x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: ConsumerLagGrowingNoProgress
        exp_alerts: []   # still pending — not sustained 5m yet
      - eval_time: 7m
        alertname: ConsumerLagGrowingNoProgress
        exp_alerts:
          - exp_labels:
              severity: page
              service: market-raccoon
              slo: store
            exp_annotations:
              summary: "Consumer lag growing with zero commits"
              description: "JetStream consumer lag is increasing but store commit rate is near-zero for 5 minutes. Pipeline may be stalled or deadlocked."
              runbook_url: "docs/observability/runbooks/consumer-stall.md"

  # ── Test 5b ───────────────────────────────────────────────────────────────
  # ConsumerLagGrowingNoProgress must NOT fire when commits are healthy,
  # even if lag derivative is positive (lag catching up is normal).
  - interval: 1m
    input_series:
      - series: 'slo:consumer_lag:deriv_5m{service="market-raccoon"}'
        values: "2+0x10"
      - series: 'slo:store:commit_rate_ok_5m{service="market-raccoon"}'
        values: "5+0x10"
    alert_rule_test:
      - eval_time: 7m
        alertname: ConsumerLagGrowingNoProgress
        exp_alerts: []   # commits healthy — must NOT fire

  # ── Test 5c ───────────────────────────────────────────────────────────────
  # ProcessGoroutinesHigh must fire when goroutines > 10000 for 5m.
  - interval: 1m
    input_series:
      - series: 'process_goroutines'
        values: "15000+0x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: ProcessGoroutinesHigh
        exp_alerts: []   # still pending
      - eval_time: 7m
        alertname: ProcessGoroutinesHigh
        exp_alerts:
          - exp_labels:
              severity: ticket
              service: market-raccoon
              slo: runtime
            exp_annotations:
              summary: "Goroutine count is abnormally high"
              description: "process_goroutines exceeds 10 000 for 5 minutes. Possible goroutine leak in actor spawning or consumer loops."
              runbook_url: "docs/observability/runbooks/consumer-stall.md"

  # ── Test 5d ───────────────────────────────────────────────────────────────
  # ProcessHeapAllocHigh must fire when heap > 500MB for 5m.
  - interval: 1m
    input_series:
      - series: 'process_heap_alloc_bytes'
        values: "600000000+0x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: ProcessHeapAllocHigh
        exp_alerts: []   # still pending
      - eval_time: 7m
        alertname: ProcessHeapAllocHigh
        exp_alerts:
          - exp_labels:
              severity: ticket
              service: market-raccoon
              slo: runtime
            exp_annotations:
              summary: "Heap allocation is high"
              description: "process_heap_alloc_bytes exceeds 500 MB for 5 minutes. Possible memory leak or unbounded cache growth."
              runbook_url: "docs/observability/runbooks/consumer-stall.md"

  # ── Test 5 ────────────────────────────────────────────────────────────────
  # StoreCommitLatencyHigh must NOT fire at 4m (condition not yet sustained
  # for 5m) and MUST fire at 7m.  All observations are placed in the (1,2.5]
  # histogram bucket so p95 ≈ 2.4s, well above the 1s threshold.
  - interval: 1m
    input_series:
      - series: 'store_commit_latency_seconds_bucket{le="1"}'
        values: "0+0x10"
      - series: 'store_commit_latency_seconds_bucket{le="2.5"}'
        values: "0+10x10"
      - series: 'store_commit_latency_seconds_bucket{le="+Inf"}'
        values: "0+10x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: StoreCommitLatencyHigh
        exp_alerts: []   # still pending — not sustained 5m yet
      - eval_time: 7m
        alertname: StoreCommitLatencyHigh
        exp_alerts:
          - exp_labels:
              severity: ticket
              service: market-raccoon
              slo: store
            exp_annotations:
              summary: "Store commit latency p95 exceeds 1s"
              description: "Cold-path ClickHouse commit p95 latency is above 1 second for 5 minutes, indicating storage degradation."
              runbook_url: "docs/operations/cold-path-runbook.md"

  # ── Test 6a ───────────────────────────────────────────────────────────────
  # SLOIngestBurnRateSlow must fire when BOTH 30m and 6h windows exceed 6.
  # for: 5m → alert fires at eval_time=7m (condition true since t=0).
  - interval: 1m
    input_series:
      - series: 'slo:ingest:burn_rate_30m{service="market-raccoon",stream="bookdelta",venue="binance"}'
        values: "10+0x10"
      - series: 'slo:ingest:burn_rate_6h{service="market-raccoon",stream="bookdelta",venue="binance"}'
        values: "10+0x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: SLOIngestBurnRateSlow
        exp_alerts: []   # still pending — not sustained 5m yet
      - eval_time: 7m
        alertname: SLOIngestBurnRateSlow
        exp_alerts:
          - exp_labels:
              severity: ticket
              service: market-raccoon
              slo: ingest
              stream: bookdelta
              venue: binance
            exp_annotations:
              summary: "Ingest SLO slow burn-rate high"
              description: "Ingest error budget burn-rate is above slow threshold on 30m/6h windows."
              runbook_url: "docs/observability/runbooks/ingest.md"

  # ── Test 6b ───────────────────────────────────────────────────────────────
  # SLOIngestBurnRateSlow must NOT fire when only 30m exceeds threshold
  # but 6h stays below (conjunction guard).
  - interval: 1m
    input_series:
      - series: 'slo:ingest:burn_rate_30m{service="market-raccoon",stream="bookdelta",venue="binance"}'
        values: "10+0x10"
      - series: 'slo:ingest:burn_rate_6h{service="market-raccoon",stream="bookdelta",venue="binance"}'
        values: "3+0x10"
    alert_rule_test:
      - eval_time: 7m
        alertname: SLOIngestBurnRateSlow
        exp_alerts: []   # 6h below threshold — conjunction false

  # ── Test 7a ───────────────────────────────────────────────────────────────
  # SLODeliveryLatencyBurnRateFast must fire when BOTH 5m and 1h windows
  # exceed 14.4. for: 2m → fires at eval_time=3m.
  - interval: 1m
    input_series:
      - series: 'slo:delivery_latency:burn_rate_5m{service="market-raccoon",stream="ws",venue="binance"}'
        values: "20+0x5"
      - series: 'slo:delivery_latency:burn_rate_1h{service="market-raccoon",stream="ws",venue="binance"}'
        values: "20+0x5"
    alert_rule_test:
      - eval_time: 3m
        alertname: SLODeliveryLatencyBurnRateFast
        exp_alerts:
          - exp_labels:
              severity: page
              service: market-raccoon
              slo: delivery_latency
              stream: ws
              venue: binance
            exp_annotations:
              summary: "Delivery latency SLO fast burn-rate high"
              description: "Delivery latency error budget burn-rate is above fast threshold on 5m/1h windows."
              runbook_url: "docs/observability/runbooks/websocket.md"

  # ── Test 7b ───────────────────────────────────────────────────────────────
  # SLODeliveryLatencyBurnRateFast must NOT fire when 1h is below threshold.
  - interval: 1m
    input_series:
      - series: 'slo:delivery_latency:burn_rate_5m{service="market-raccoon",stream="ws",venue="binance"}'
        values: "20+0x5"
      - series: 'slo:delivery_latency:burn_rate_1h{service="market-raccoon",stream="ws",venue="binance"}'
        values: "5+0x5"
    alert_rule_test:
      - eval_time: 3m
        alertname: SLODeliveryLatencyBurnRateFast
        exp_alerts: []   # 1h below threshold — conjunction false

  # ── Test 8a ───────────────────────────────────────────────────────────────
  # SLODeliveryLatencyBurnRateSlow must fire when BOTH 30m and 6h exceed 6.
  # for: 5m → fires at eval_time=7m.
  - interval: 1m
    input_series:
      - series: 'slo:delivery_latency:burn_rate_30m{service="market-raccoon",stream="ws",venue="binance"}'
        values: "10+0x10"
      - series: 'slo:delivery_latency:burn_rate_6h{service="market-raccoon",stream="ws",venue="binance"}'
        values: "10+0x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: SLODeliveryLatencyBurnRateSlow
        exp_alerts: []   # still pending
      - eval_time: 7m
        alertname: SLODeliveryLatencyBurnRateSlow
        exp_alerts:
          - exp_labels:
              severity: ticket
              service: market-raccoon
              slo: delivery_latency
              stream: ws
              venue: binance
            exp_annotations:
              summary: "Delivery latency SLO slow burn-rate high"
              description: "Delivery latency error budget burn-rate is above slow threshold on 30m/6h windows."
              runbook_url: "docs/observability/runbooks/websocket.md"

  # ── Test 9a ───────────────────────────────────────────────────────────────
  # SLODataLossBurnRateFast must fire when BOTH 5m and 1h windows exceed 14.4.
  # for: 2m → fires at eval_time=3m.
  - interval: 1m
    input_series:
      - series: 'slo:data_loss:burn_rate_5m{service="market-raccoon",stream="all",venue="all"}'
        values: "20+0x5"
      - series: 'slo:data_loss:burn_rate_1h{service="market-raccoon",stream="all",venue="all"}'
        values: "20+0x5"
    alert_rule_test:
      - eval_time: 3m
        alertname: SLODataLossBurnRateFast
        exp_alerts:
          - exp_labels:
              severity: page
              service: market-raccoon
              slo: data_loss
              stream: all
              venue: all
            exp_annotations:
              summary: "Data loss guard fast burn-rate high"
              description: "Data loss guard error budget burn-rate is above fast threshold on 5m/1h windows."
              runbook_url: "docs/observability/runbooks/guardian.md"

  # ── Test 9b ───────────────────────────────────────────────────────────────
  # SLODataLossBurnRateFast must NOT fire when 1h is below threshold.
  - interval: 1m
    input_series:
      - series: 'slo:data_loss:burn_rate_5m{service="market-raccoon",stream="all",venue="all"}'
        values: "20+0x5"
      - series: 'slo:data_loss:burn_rate_1h{service="market-raccoon",stream="all",venue="all"}'
        values: "5+0x5"
    alert_rule_test:
      - eval_time: 3m
        alertname: SLODataLossBurnRateFast
        exp_alerts: []   # 1h below threshold — conjunction false

  # ── Test 10a ──────────────────────────────────────────────────────────────
  # SLODataLossBurnRateSlow must fire when BOTH 30m and 6h windows exceed 6.
  # for: 5m → fires at eval_time=7m.
  - interval: 1m
    input_series:
      - series: 'slo:data_loss:burn_rate_30m{service="market-raccoon",stream="all",venue="all"}'
        values: "10+0x10"
      - series: 'slo:data_loss:burn_rate_6h{service="market-raccoon",stream="all",venue="all"}'
        values: "10+0x10"
    alert_rule_test:
      - eval_time: 4m
        alertname: SLODataLossBurnRateSlow
        exp_alerts: []   # still pending
      - eval_time: 7m
        alertname: SLODataLossBurnRateSlow
        exp_alerts:
          - exp_labels:
              severity: ticket
              service: market-raccoon
              slo: data_loss
              stream: all
              venue: all
            exp_annotations:
              summary: "Data loss guard slow burn-rate high"
              description: "Data loss guard error budget burn-rate is above slow threshold on 30m/6h windows."
              runbook_url: "docs/observability/runbooks/guardian.md"
