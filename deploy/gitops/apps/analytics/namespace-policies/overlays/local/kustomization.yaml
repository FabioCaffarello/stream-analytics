---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: ResourceQuota
      name: analytics-quota
    patch: |
      - op: replace
        path: /spec/hard/requests.cpu
        value: "2"
      - op: replace
        path: /spec/hard/requests.memory
        value: "4Gi"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "6"
      - op: replace
        path: /spec/hard/limits.memory
        value: "8Gi"
