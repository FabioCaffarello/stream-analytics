---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: analytics
  labels:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: jobmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: jobmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink
        app.kubernetes.io/component: jobmanager
    spec:
      serviceAccountName: flink
      securityContext:
        runAsUser: 9999
        runAsGroup: 9999
        fsGroup: 9999
        runAsNonRoot: true
      containers:
        - name: jobmanager
          image: flink:1.19-java11
          args: ["jobmanager"]
          ports:
            - name: rpc
              containerPort: 6123
              protocol: TCP
            - name: blob
              containerPort: 6124
              protocol: TCP
            - name: ui
              containerPort: 8081
              protocol: TCP
          env:
            - name: FLINK_PROPERTIES
              valueFrom:
                configMapKeyRef:
                  name: flink-config
                  key: flink-conf.yaml
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          volumeMounts:
            - name: flink-config-volume
              mountPath: /opt/flink/conf
          livenessProbe:
            httpGet:
              path: /overview
              port: ui
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /overview
              port: ui
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: flink-config-volume
          configMap:
            name: flink-config
            items:
              - key: flink-conf.yaml
                path: flink-conf.yaml
              - key: log4j-console.properties
                path: log4j-console.properties
