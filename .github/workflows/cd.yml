name: cd

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: cd-release-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  # ── CI gate: ci-fast must pass before any image is built ───────────
  ci-gate:
    uses: ./.github/workflows/ci-fast.yml
    permissions:
      contents: read

  # ── Parallel per-binary build, push, and attestation ───────────────
  build-push:
    needs: ci-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        binary: [server, consumer, processor, store, migrate]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca  # v3.9.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893  # v5.9.0
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.binary }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v6.9.0
        with:
          context: .
          file: deploy/docker/${{ matrix.binary }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.binary }}
          cache-to: type=gha,mode=max,scope=${{ matrix.binary }}

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a4  # v0.30.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.binary }}@${{ steps.push.outputs.digest }}
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          format: 'table'

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.binary }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
