---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability-stack
resources:
  - statefulset.yaml
  - service.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - pdb.yaml
components:
  - ../../../../lib/labels
configMapGenerator:
  - name: prometheus-config
    files:
      - prometheus.yml
    options:
      disableNameSuffixHash: true
