name: workspace-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_integration:
        description: "Run optional JetStream integration tests"
        required: false
        default: "false"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1
      - name: Install protobuf generator tools
        run: make tools
      - name: Proto lint
        run: make proto-lint
      - name: Proto breaking
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "Main branch detected; enforcing full proto-breaking gate."
            make proto-breaking
            exit 0
          fi

          git fetch --no-tags --prune --depth=1 origin main:main
          if git ls-tree -r --name-only main -- proto | grep -qE '\.proto$'; then
            echo "Main proto baseline detected; enforcing proto-breaking gate."
            make proto-breaking
          else
            echo "Main proto baseline does not exist yet; enforcing lint + proto-gen drift gates only."
          fi
      - name: Proto generate check
        run: |
          make proto-gen
          if ! git diff --exit-code -- internal/shared/proto/gen; then
            echo "Generated protobuf drift detected under internal/shared/proto/gen. Run 'make proto-gen' and commit generated files."
            exit 1
          fi
      - name: Import boundary guard
        run: go test ./internal/shared/contracts -run TestImportGuard_ProtoImportsStayInSharedBoundary -count=1
      - name: Install tools
        run: make install-tools
      - name: Run CI pipeline
        run: make ci VULN_REQUIRED=true

  integration-jetstream:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_integration == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
      - name: Run JetStream integration tests
        run: go test -tags=integration ./internal/adapters/jetstream -count=1 -v
