---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: analytics
  labels:
    app.kubernetes.io/name: metabase
    app.kubernetes.io/component: bi-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
        app.kubernetes.io/component: bi-dashboard
    spec:
      serviceAccountName: metabase
      securityContext:
        runAsUser: 2000
        runAsGroup: 2000
        fsGroup: 2000
        runAsNonRoot: true
      containers:
        - name: metabase
          image: metabase/metabase:v0.52.2
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: MB_DB_TYPE
              value: postgres
            - name: MB_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: MB_DB_HOST
            - name: MB_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: MB_DB_PORT
            - name: MB_DB_DBNAME
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: MB_DB_DBNAME
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: MB_DB_USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: MB_DB_PASS
            - name: JAVA_TIMEZONE
              value: UTC
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1.5Gi"
          volumeMounts:
            - name: metabase-data
              mountPath: /metabase-data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: metabase-data
          persistentVolumeClaim:
            claimName: metabase-data
