---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stream-analytics-client
  namespace: stream-analytics-client
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - staging.stream-analytics.example.com
      secretName: stream-analytics-client-tls
  rules:
    - host: staging.stream-analytics.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stream-analytics-client
                port:
                  name: http
